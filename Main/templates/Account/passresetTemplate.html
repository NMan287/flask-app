<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        body {
            font-family: 'Nunito', cursive;
            background-color: rgb(236, 236, 236);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: rgb(216, 216, 216);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 360px;
        }

        .title1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
        }

        .input1 {
            margin-top: 10px;
            padding: 10px;
            font-size: 16px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn1 {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            color: #fff;
            background-color: #007BFF;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }

        .btn1:hover { 
            background-color: #0056b3;
         }
        .btn1:active { 
            background-color: #004085;
         }
        .btn1:disabled { 
            background-color: #aaa; cursor: not-allowed;
         }
        .message {
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title1">Reset your password</h1>
        <input type="email" id="emailInput" class="input1" placeholder="Enter your email address" required>
        <button class="btn1" id="resetBtn">Reset Password</button>
        <p class="message" id="message"></p>
    </div>

    <script>
        document.getElementById('resetBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value.trim();
            const message = document.getElementById('message');
            const btn = document.getElementById('resetBtn');

            if (!email) {
                message.style.color = 'red';
                message.textContent = 'Enter an email address';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();
                message.style.color = 'green';
                message.textContent = data.message;

            } catch (err) {
                message.style.color = 'red';
                message.textContent = 'Error: Try again';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
