<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="{{url_for('static', filename='Account/resetPass.css')}}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="resetContainer">
            <h1 id="title1" class="title1">Please enter your new password</h1>

            <p class="inpText1">New Password:</p>
            <input type="password" id="passwordInput" placeholder="Password" class="inpBox1">

            <p class="inpText1">Confirm Password:</p>
            <input type="password" id="confirmInput" placeholder="Confirm Password" class="inpBox1">

            <button class="btn1" id="resetBtn">Reset Password</button>
            <p id="message" style="margin-top: 15px; font-size: 14px;"></p>
        </div>
    </div>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');

        document.getElementById('resetBtn').addEventListener('click', async () => {
            const password = document.getElementById('passwordInput').value;
            const confirm = document.getElementById('confirmInput').value;
            const message = document.getElementById('message');
            const btn = document.getElementById('resetBtn');

            if (!password) {
                message.style.color = 'red';
                message.textContent = 'Fill in both fields';
                return;
            }
            if (!confirm){
                message.style.color = 'red'
                message.textContent = 'Fill in both fields';
                return
            }

            if (password !== confirm) {
                message.style.color = 'red';
                message.textContent = 'Passwords do not match';
                return;
            }

            if (password.length < 8) {
                message.style.color = 'red';
                message.textContent = 'At least 8 characters';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await response.json();

                if (response.ok) {
                    message.style.color = 'green';
                    message.textContent = 'Password Reset!';
                    setTimeout(() => window.location.href = '/userLogin', 2000);
                } else {
                    message.style.color = 'red';
                    message.textContent = 'Try again';
                }
            } catch (err) {
                message.style.color = 'red';
                message.textContent = 'Error: Try again';
            } finally {
                btn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
